# PR validation. Runs ./gradlew check on every pull request and on pushes to
# main. Catches test failures and compile errors before they reach a release tag.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel superseded PR runs (e.g. force-push); queue main pushes so we never
  # drop verification of a merge commit.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  spotless:
    name: Spotless (formatting)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so spotless ratchet can walk back to the merge
          # base with main without hitting a missing-object error.
          fetch-depth: 0

      # actions/checkout only populates the ref it checked out (e.g.
      # refs/pull/<N>/merge), so `refs/remotes/origin/main` is still absent
      # and spotless ratchetFrom fails with "No such reference 'origin/main'".
      # Create it explicitly. Cheap since fetch-depth: 0 already has the objects.
      - name: Populate origin/main for spotless ratchet
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run spotlessCheck
        run: ./gradlew spotlessCheck --stacktrace

  check:
    name: Build + test (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: jvm
            label: JVM/Desktop
            tasks: >-
              :ohs-player-library:jvmTest
              :ohs-player-reference-app:jvmTest
            kotlinDaemonHeap: '-Xmx6g -XX:+UseG1GC'
            extraArgs: ''
          - id: android
            label: Android
            # ohs-player-library uses the androidKotlinMultiplatformLibrary
            # plugin, which doesn't register `lintDebug` - assembleAndroidMain
            # is the closest "compile + verify the Android variant" task it
            # exposes. ohs-player-reference-app uses classic androidTarget
            # and keeps lintDebug.
            tasks: >-
              :ohs-player-library:assembleAndroidMain
              :ohs-player-reference-app:lintDebug
            kotlinDaemonHeap: '-Xmx6g -XX:+UseG1GC'
            extraArgs: ''
          - id: js
            label: Kotlin/JS
            # jsBrowserTest is disabled in build.gradle.kts, but requesting
            # it still runs the compile prerequisites (compileKotlinJs +
            # compileTestDevelopmentExecutableKotlinJs) — which is the work
            # we want covered.
            tasks: ':ohs-player-reference-app:jsBrowserTest'
            kotlinDaemonHeap: '-Xmx10g -XX:+UseG1GC'
            extraArgs: ''
          - id: wasm
            label: Kotlin/Wasm
            tasks: >-
              :ohs-player-library:wasmJsBrowserTest
              :ohs-player-reference-app:wasmJsBrowserTest
            kotlinDaemonHeap: '-Xmx10g -XX:+UseG1GC'
            # Serialize the library + reference-app wasm compiles so they
            # don't run concurrently as workers and double the daemon heap
            # demand even at 10g.
            extraArgs: '--max-workers=1'
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ${{ matrix.label }}
        run: >-
          ./gradlew ${{ matrix.tasks }}
          -Pkotlin.daemon.jvmargs="${{ matrix.kotlinDaemonHeap }}"
          ${{ matrix.extraArgs }}
          --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.id }}
          path: |
            **/build/reports/**
            **/build/test-results/**
          retention-days: 7
          if-no-files-found: ignore

  ios-check:
    # iOS needs macOS runners (10× billing), so split by arch to avoid K/N
    # compiler contention on a single 14 GB runner. Debug link proves iOS
    # compiles/links; release link goes in release.yml once iOS ships.
    name: iOS compile (${{ matrix.label }})
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: iosArm64
            target: IosArm64
          - label: iosSimulatorArm64
            target: IosSimulatorArm64
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Compile + link ${{ matrix.label }}
        run: |
          ./gradlew --stacktrace \
            :ohs-player-library:compileKotlin${{ matrix.target }} \
            :ohs-player-reference-app:linkDebugFramework${{ matrix.target }}
